name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app:
    name: FastAPI tests and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install application with dev tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Run tests
        run: pytest

  infrastructure:
    name: Terraform and Helm validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform -chdir=terraform fmt -recursive -check

      - name: Terraform init without backend
        run: terraform -chdir=terraform/environments/dev init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform/environments/dev validate

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint AI inference chart
        run: helm lint ./helm/ai-inference --values ./helm/ai-inference/values-dev.yaml

      - name: Render AI inference chart
        run: |
          helm template ai-inference ./helm/ai-inference \
            --namespace ai-platform \
            --values ./helm/ai-inference/values-dev.yaml

  manifests:
    name: YAML manifest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: python -m pip install pyyaml

      - name: Parse YAML manifests
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          files = [
              *pathlib.Path("argocd").rglob("*.yaml"),
              *pathlib.Path("k8s").rglob("*.yaml"),
          ]

          for manifest in files:
              list(yaml.safe_load_all(manifest.read_text()))

          print(f"Parsed {len(files)} YAML files")
          PY
