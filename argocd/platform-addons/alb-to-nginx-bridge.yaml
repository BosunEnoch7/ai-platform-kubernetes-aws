apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alb-to-nginx-bridge
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform-addons
spec:
  project: platform
  source:
    repoURL: https://github.com/REPLACE_WITH_GITHUB_USERNAME/ai-platform-kubernetes-aws.git
    targetRevision: main
    path: k8s/platform/alb-to-nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
