apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-addons
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/REPLACE_WITH_GITHUB_USERNAME/ai-platform-kubernetes-aws.git
    targetRevision: main
    path: argocd/platform-addons
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
