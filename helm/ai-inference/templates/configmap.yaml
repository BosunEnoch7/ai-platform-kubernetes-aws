apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-inference.fullname" . }}
  labels:
    {{- include "ai-inference.labels" . | nindent 4 }}
data:
  APP_SERVICE_NAME: {{ .Values.config.serviceName | quote }}
  APP_ENVIRONMENT: {{ .Values.config.environment | quote }}
  APP_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  APP_PROVIDER: {{ .Values.config.provider | quote }}
