{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-inference.fullname" . }}
  labels:
    {{- include "ai-inference.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ai-inference.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressNamespaceLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.monitoringNamespaceLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
{{- end }}
